<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    pointer-events: none;
    user-select: none;
    cursor: none;
  }

  #ring {
    position: fixed;
    top: 0;
    left: 0;
    border-radius: 50%;
    box-sizing: border-box;
    will-change: transform;
    pointer-events: none;
    /* size, border and colors are set from JS */
    transition: border-color 90ms ease, box-shadow 90ms ease;
  }

  #ring.hidden {
    display: none;
  }

  #keys {
    position: fixed;
    left: 50%;
    bottom: 10%;
    transform: translateX(-50%) scale(0.96);
    background: rgba(40, 40, 42, 0.92);
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    font-size: 44px;
    font-weight: 500;
    letter-spacing: 6px;
    line-height: 1;
    padding: 22px 34px;
    border-radius: 18px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    opacity: 0;
    transition: opacity 160ms ease, transform 160ms ease;
    white-space: nowrap;
    pointer-events: none;
  }

  #keys.visible {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }
</style>
</head>
<body>
  <div id="ring" class="hidden"></div>
  <div id="keys"></div>
  <script src="overlay.js"></script>
</body>
</html>
